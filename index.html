<script>
const data = {
    Academic: {
        "Poor Concentration": [
            "Utilize the Pomodoro Technique: study dedicatedly for 25 minutes, then take a short 5-minute mental break.",
            "Watch this helpful guide: <a href='https://youtube.com/shorts/YdB7I6X8x9U' target='_blank' onclick='event.stopPropagation();' style='color: #d63031; text-decoration: underline; font-weight: bold;'>Pomodoro Technique Video</a>"
        ],
        "Excessive Worry / Exam Anxiety / Fear of Failure": [
            "Practice systematic deep breathing patterns to lower stress signals and restore steady focus."
        ]
    },
    Cognitive: {
        "Feeling Helpless & Hopeless": ["Reach out directly to professional counselors or trusted guidance networks for emotional support."],
        "Low Self Confidence": ["Engage in intentional, positive self-talk to redirect mental focus and rebuild personal assurance."],
        "Negative Thinking": ["Take an active break and go for a relaxing walk in natural, open green environments."]
    },
    Affective: {
        "Crying Easily": ["Allow yourself the emotional space to cry it out and naturally discharge pent-up internal pressures."],
        "Irritability": ["Initiate processing, supportive conversations with a closely trusted loved one or friend."]
    },
    Psychomotor: {
        "Frequent Headaches": ["Perform systematic structural eye exercises to rest optical muscles and lower tension benchmarks."],
        "Muscle Tension / Body Pain": ["Engage in targeted physical stretching exercises to safely release somatic physical stress."],
        "Irregular Sleep": ["Strictly follow a balanced sleep cycle routine; systematically monitor where your rest gets disturbed and proactively erase those activities."],
        "Changes in Appetite": ["Adapt eating habits to small, frequent, and well-balanced nutritional meals throughout the day."],
        "Procrastination": ["Enforce focus parameters by explicitly setting an execution timer or mapping out a rigid activity schedule."]
    }
};

let currentDomain = "";

function selectDomain(domain) {
    currentDomain = domain;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page2").classList.add("active");
    document.getElementById("domainTitle").innerText = domain + " Challenges";
    
    let list = "";
    for (let prob in data[domain]) {
        list += `<label style="display:flex; align-items:center; font-size:1.15rem; margin-bottom:12px; cursor:pointer; background: #fff; padding: 10px; border-radius: 12px; border: 2px solid #eee; box-shadow: 3px 3px 0px rgba(0,0,0,0.05);">
                 <input type="checkbox" value="${prob}" style="width:20px; height:20px; margin-right:15px;"> ${prob}</label>`;
    }
    document.getElementById("problemList").innerHTML = list;
}

function showCards() {
    const selected = document.querySelectorAll('#problemList input:checked');
    if (selected.length === 0) return alert("Please select a challenge!");

    const container = document.getElementById("cards");
    container.innerHTML = "";

    selected.forEach(item => {
        let p = item.value;
        let sols = data[currentDomain][p];
        let solHtml = sols.map(s => `<li>${s}</li>`).join("");

        // Default fallback image link if no specific GIF matches
        let gifUrl = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B0ZndpYm9wYm9wM3M0ZzBwYm9wYm9wM3M0ZzBwYm9wYm9wJnBvX2lkPTU4MzI1/3o7EFAyD6m6156cA1O/giphy.gif";
        
        // Use live web links for your cards so you don't need local files!
        if (p.includes("Excessive Worry")) {
            gifUrl = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM29icm80bXN6N3Znbm00b216Z3E0ZzBwYm9wM3M0ZzBwYm9wJnBvX2lkPTU4MzI1/krP2NRkLqnmg/giphy.gif";
        }
        if (p.includes("Poor Concentration")) {
            gifUrl = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3M0ZzBwYm9wYm9wM3M0ZzBwYm9wYm9wM3M0ZzBwYm9wJnBvX2lkPTU4MzI1/l2Jebd7BPwe7RGsYW/giphy.gif";
        }
        
        container.innerHTML += `
            <div class="card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-front">${p}</div>
                    <div class="card-back">
                        <strong style="color:#d63031; border-bottom:2px solid #ddd; padding-bottom:5px; margin-bottom:8px; display:block;">SOLUTIONS:</strong>
                        <ul class="sol-list">${solHtml}</ul>
                        <img class="card-gif" src="${gifUrl}" alt="${p} Visual Guide" onerror="this.style.display='none';">
                    </div>
                </div>
            </div>`;
    });

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page3").classList.add("active");
}

function goHome() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page1").classList.add("active");
}

function goBackProblems() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page2").classList.add("active");
}
</script>
