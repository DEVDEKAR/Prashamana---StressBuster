<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashamana (प्रशमन): Nurturing the Caregiver</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@800&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ================= GLOBAL ================= */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Comic Neue', cursive; background-color: #f0f8ff; overflow-x: hidden; }

        .app-header { position: fixed; top: 0; width: 100%; text-align: center; background: #ffffff; padding: 15px 0; border-bottom: 5px solid #2d3436; z-index: 1000; }
        .app-header h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(1rem, 5vw, 2rem); color: #2d3436; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .app-header span { color: #d63031; border-bottom: 3px solid #d63031; }

        .page { display: none; width: 100vw; height: 100vh; position: relative; padding-top: 80px; box-sizing: border-box; }
        .active { display: flex; }

        /* ================= PAGE 1 ================= */
        #page1 { background: #62c6e2; align-items: center; justify-content: center; overflow: hidden; }
        .p1-layout { display: flex; flex-direction: row; align-items: center; justify-content: center; width: 90%; max-width: 1000px; height: 80vh; gap: 40px; z-index: 10; }
        .nurse-landing { flex: 0 0 350px; height: 100%; background: url('1.jpeg') no-repeat center center; background-size: contain; }
        .domain-menu { flex: 0 1 400px; display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; text-align: center; }
        
        .decoration { position: absolute; font-size: 65px; opacity: 0.9; z-index: 1; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-10px, -20px) rotate(5deg); } }

        /* ================= PAGE 2 ================= */
        #page2 { background-color: #e3f2fd; align-items: center; justify-content: center; flex-direction: column; }
        .medical-border-frame { width: 90%; max-width: 600px; background: white; padding: 30px; border: 6px solid #2d3436; border-radius: 30px; }

        /* ================= PAGE 3 ================= */
        #page3 { background: #d48e8e; align-items: center; justify-content: center; }
        
        /* ================= CARD LAYOUT ================= */
        .card { width: 100%; max-width: 450px; height: 400px; perspective: 1500px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; position: relative; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 5px solid #2d3436; border-radius: 25px; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; }
        .card-front { background: #ff7675; color: white; font-family: 'Bangers'; justify-content: center; align-items: center; font-size: 2.2rem; text-align: center; }
        .card-back { background: #55efc4; transform: rotateY(180deg); overflow-y: auto; }
        
        .solution-media-container { width: 100%; min-height: 180px; margin-top: 15px; background: #ffffff; border: 3px solid #2d3436; border-radius: 15px; display: flex; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; }
        .inline-media { max-width: 100%; max-height: 160px; object-fit: contain; }

        /* ================= UI ELEMENTS ================= */
        .btn-main { width: 280px; padding: 16px; background: white; border: 4px solid #2d3436; border-radius: 15px; font-family: 'Bangers'; font-size: 1.6rem; cursor: pointer; box-shadow: 6px 6px 0px #2d3436; transition: 0.2s; }
        .btn-main:hover { transform: translate(-3px, -3px); box-shadow: 10px 10px 0px #2d3436; background: #ffeaa7; }
        .nav-btn { position: absolute; top: 100px; left: 30px; background: #ff3b3b; color: white; border: 3px solid black; padding: 10px 20px; font-family: 'Bangers'; cursor: pointer; z-index: 2000; border-radius: 12px; }

        @media (max-width: 768px) {
            .p1-layout { flex-direction: column; height: auto; }
            .nurse-landing { height: 35vh; width: 100%; }
        }
    </style>
</head>
<body>

<header class="app-header"><h1>PRASHAMANA: <span>Nurturing the Caregiver</span></h1></header>

<div id="page1" class="page active">
    <div class="decoration" style="top:15%; left:5%;">💉</div>
    <div class="decoration" style="bottom:15%; left:8%;">💊</div>
    <div class="decoration" style="top:25%; right:10%;">🏥</div>
    <div class="decoration" style="bottom:10%; right:5%;">❤️</div>

    <div class="p1-layout">
        <div class="nurse-landing"></div>
        <div class="domain-menu">
            <h2 style="font-family:'Bangers'; color: white; text-shadow: 4px 4px #2d3436; font-size: 2.5rem; margin-top:0;">CHOOSE A DOMAIN</h2>
            <button class="btn-main" onclick="selectDomain('Academic')">📚 Academic</button>
            <button class="btn-main" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</button>
            <button class="btn-main" onclick="selectDomain('Cognitive')">🧠 Cognitive</button>
            <button class="btn-main" onclick="selectDomain('Affective')">💛 Affective</button>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <button class="nav-btn" onclick="goHome()">🏠 HOME</button>
    <div class="medical-border-frame">
        <h2 id="domainTitle" style="font-family:'Bangers'; color:#d63031; text-align:center;"></h2>
        <div id="problemList"></div>
        <button class="btn-main" style="width:100%; background:#2ecc71; margin-top:20px;" onclick="showCards()">VIEW SOLUTION</button>
    </div>
</div>

<div id="page3" class="page">
    <button class="nav-btn" onclick="goBackProblems()">⬅ BACK</button>
    <div id="cards" style="width:100%; display:flex; justify-content:center; align-items:center;"></div>
</div>

<script>
const data = {
    Academic: { "Poor Concentration": ["Practice specific hand movements."], "Excessive Worry": ["Practice deep breathing."] },
    Cognitive: { "Feeling Helpless": ["Reach out to professionals."], "Negative Thinking": ["Take a walk in nature."] },
    Affective: { "Crying Easily": ["Allow emotional release."], "Irritability": ["Talk to a friend."] },
    Psychomotor: { 
        "Frequent Headaches": ["Structural eye exercises."], 
        "Muscle Tension": ["Targeted stretching."],
        "Irregular Sleep": ["Maintain a consistent sleep cycle.", "Watch: <a href='https://youtube.com/shorts/GeQK1Ej-Fpg' target='_blank' style='color:blue;'>Sleep Cycle Guide</a>"]
    }
};

let currentDomain = "";

function selectDomain(domain) {
    currentDomain = domain;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page2").classList.add("active");
    document.getElementById("domainTitle").innerText = domain + " Challenges";
    let list = "";
    for (let prob in data[domain]) {
        list += `<label style="display:block; margin:10px 0; background:#eee; padding:12px; border-radius:10px; cursor:pointer;">
                 <input type="radio" name="problemGroup" value="${prob}"> ${prob}</label>`;
    }
    document.getElementById("problemList").innerHTML = list;
}

function showCards() {
    const selected = document.querySelector('input[name="problemGroup"]:checked');
    if (!selected) return alert("Select a challenge!");
    const p = selected.value;
    const container = document.getElementById("cards");
    
    let mediaTag = (p.includes("Worry") || p.includes("breathing")) ? '<img class="inline-media" src="deep breathing.gif">' : '';
    
    container.innerHTML = `
        <div class="card" onclick="this.classList.toggle('flipped')">
            <div class="card-inner">
                <div class="card-front">${p}</div>
                <div class="card-back">
                    <strong style="color:#d63031; font-size:1.3rem;">SOLUTION:</strong>
                    <ul style="font-size:1.1rem; margin-top:10px;"><li>${data[currentDomain][p].join("</li><li>")}</li></ul>
                    ${mediaTag !== "" ? `<div class="solution-media-container">${mediaTag}</div>` : ""}
                </div>
            </div>
        </div>`;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page3").classList.add("active");
}

function goHome() { location.reload(); }
function goBackProblems() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById("page2").classList.add("active"); }
</script>
</body>
</html>
