<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashamana (प्रशमन): Nurturing the Caregiver</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@800&family=Comic+Neue:wght@700&display=stylesheet">
    <style>
        /* [Keep your existing CSS here] */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Comic Neue', cursive; background-color: #f0f8ff; overflow-x: hidden; }
        .page { display: none; width: 100vw; height: 100vh; position: relative; padding-top: 80px; box-sizing: border-box; }
        .active { display: flex; }
        .app-header { position: fixed; top: 0; width: 100%; text-align: center; background: #ffffff; padding: 15px 0; border-bottom: 5px solid #2d3436; z-index: 1000; }
        /* ... Add your CSS rules here ... */
    </style>
</head>
<body>

<header class="app-header"><h1>PRASHAMANA: <span>Nurturing the Caregiver</span></h1></header>

<div id="page1" class="page active">
    </div>

<div id="page2" class="page">
    <button class="nav-btn" onclick="goHome()">🏠 HOME</button>
    <div class="medical-border-frame">
        <div class="problem-content">
            <h2 id="domainTitle" style="font-family:'Bangers'; color: #d63031; text-align: center;"></h2>
            <div id="problemList"></div>
            <button class="btn-main" style="width: 100%; background: #2ecc71; margin-top: 20px;" onclick="showCards()">VIEW SOLUTION</button>
        </div>
    </div>
</div>

<div id="page3" class="page">
    <button class="nav-btn" onclick="goBackProblems()">⬅️ BACK</button>
    <div class="p3-layout">
        <div class="p3-nurse-full"></div>
        <div class="p3-cards-container" id="cards"></div>
    </div>
</div>

<script>
const data = {
    Academic: {
        "Poor Concentration": ["Practice the specific hand movement exercise.", "Watch: <a href='https://youtube.com/shorts/YdB7I6X8x9U' target='_blank'>Hand Movement Activity</a>"],
        "Excessive Worry": ["Practice systematic deep breathing."]
    },
    Cognitive: { "Feeling Helpless": ["Reach out for support."], "Negative Thinking": ["Take a nature walk."] },
    Affective: { "Crying Easily": ["Allow yourself emotional space."], "Irritability": ["Initiate supportive conversations."] },
    Psychomotor: {
        "Frequent Headaches": ["Perform eye exercises."],
        "Muscle Tension": ["Targeted physical stretching."],
        "Irregular Sleep": ["Strictly follow a sleep cycle routine.", "Watch: <a href='https://youtube.com/shorts/GeQK1Ej-Fpg' target='_blank'>Sleep Cycle Video</a>"],
        "Changes in Appetite": ["Eat small, frequent, balanced meals."]
    }
};

let currentDomain = "";

function selectDomain(domain) {
    currentDomain = domain;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page2").classList.add("active");
    document.getElementById("domainTitle").innerText = domain + " Challenges";
    let list = "";
    for (let prob in data[domain]) {
        list += `<label><input type="radio" name="problemGroup" value="${prob}"> ${prob}</label>`;
    }
    document.getElementById("problemList").innerHTML = list;
}

function showCards() {
    const selected = document.querySelector('#problemList input[name="problemGroup"]:checked');
    if (!selected) return alert("Please select a challenge!");

    const container = document.getElementById("cards");
    let p = selected.value.trim();
    let sols = data[currentDomain][p];
    
    // Corrected: Using backticks for template literals
    let solHtml = sols ? sols.map(s => `<li>${s}</li>`).join("") : "<li>Follow wellness advice.</li>";

    let checkText = p.toLowerCase();
    let mediaTag = "";

    // Simplified media logic
    if (checkText.includes("worry") || checkText.includes("breathing")) {
        mediaTag = `<img class="inline-media large-breathing-gif" src="deep breathing.gif">`;
    } else if (checkText.includes("headache")) {
        mediaTag = `<video class="inline-media" src="headache relieving exercise.mp4" autoplay loop muted playsinline controls></video>`;
    }
    
    container.innerHTML = `
        <div class="card" onclick="this.classList.toggle('flipped')">
            <div class="card-inner">
                <div class="card-front"><h1>${p}</h1></div>
                <div class="card-back">
                    <strong style="color:#d63031;">SOLUTION:</strong>
                    <ul class="sol-list">${solHtml}</ul>
                    ${mediaTag}
                </div>
            </div>
        </div>`;

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page3").classList.add("active");
}

function goHome() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page1").classList.add("active");
}

function goBackProblems() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page2").classList.add("active");
}
</script>
</body>
</html>
