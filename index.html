<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashamana: Nurturing the Caregiver</title>
    <style>
        /* Base Page Styling */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #dca09c; /* Matches the dusty rose background */
        }

        /* Top Header */
        .header {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            background: white;
            padding: 10px 0;
            text-transform: uppercase;
        }
        .header span {
            color: #d33; /* Red underline/text highlight style */
            border-bottom: 3px solid #d33;
        }

        /* Main Split Container */
        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: stretch;
        }

        /* Left Side (Nurse Illustration Card) */
        .left-card {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: -10px;
            background: #ff3333;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .left-card img {
            max-width: 90%;
            height: auto;
        }

        /* Right Side (Content & Solutions Card) */
        .right-card {
            flex: 1;
            background: #f7f7f7;
            border: 4px solid #333;
            border-radius: 40px; /* Distinct rounded thick border */
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* Inside Green Solutions Card */
        .solutions-box {
            background-color: #5ce6b0; /* Bright mint green background */
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            color: #000;
        }
        .solutions-box h3 {
            margin-top: 0;
            color: #d33;
            font-size: 20px;
            letter-spacing: 1px;
        }
        .solutions-box ul {
            padding-left: 20px;
            line-height: 1.5;
            font-size: 16px;
            font-weight: 500;
        }

        /* The GIF Styling */
        .gif-container {
            margin-top: 20px;
            background: white;
            border: 2px solid #333;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .gif-container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        PRASHAMANA: <span>NURTURING THE CAREGIVER</span>
    </div>

    <div class="main-container">
        <!-- LEFT CARD: Nurse Image -->
        <div class="left-card">
            <a href="#" class="back-btn">&larr; BACK</a>
            <!-- Replace 'nurse.png' with your actual illustration filename if different -->
            <img src="nurse.png" alt="Nurse Illustration">
        </div>

        <!-- RIGHT CARD: Text and Local GIF -->
        <div class="right-card">
            <div class="solutions-box">
                <h3>SOLUTIONS:</h3>
                <ul>
                    <li>Practice systematic deep breathing patterns to lower stress signals and restore steady focus.</li>
                </ul>

                <!-- FIXED LOCAL GIF ELEMENT -->
                <div class="gif-container">
                    <img src="guide.gif" alt="Excessive Worry / Exam Anxiety / Fear of Failure Visual Guide">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
