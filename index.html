<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashamana: Nurturing the Caregiver</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@800&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Global Reset */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Comic Neue', cursive; background-color: #f0f8ff; overflow-x: hidden; }

        /* Header */
        .app-header { position: fixed; top: 0; width: 100%; text-align: center; background: #ffffff; padding: 15px 0; border-bottom: 5px solid #2d3436; z-index: 1000; }
        .app-header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; color: #2d3436; margin: 0; text-transform: uppercase; }
        .app-header span { color: #d63031; }

        /* Pages */
        .page { display: none; width: 100vw; height: 100vh; padding-top: 80px; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* UI Elements */
        .btn-main { width: 280px; padding: 16px; margin: 10px; background: white; border: 4px solid #2d3436; border-radius: 15px; font-family: 'Bangers'; font-size: 1.5rem; cursor: pointer; box-shadow: 6px 6px 0px #2d3436; }
        .btn-main:hover { transform: translate(-3px, -3px); box-shadow: 10px 10px 0px #2d3436; background: #ffeaa7; }
        
        .nav-btn { position: absolute; top: 100px; left: 30px; background: #ff3b3b; color: white; border: 3px solid black; padding: 10px 20px; font-family: 'Bangers'; cursor: pointer; border-radius: 12px; z-index: 2000; }
        
        /* Containers */
        .content-frame { width: 90%; max-width: 800px; background: white; padding: 40px; border-radius: 30px; border: 6px solid #2d3436; text-align: center; }
    </style>
</head>
<body>

<header class="app-header">
    <h1>PRASHAMANA: <span>Nurturing the Caregiver</span></h1>
</header>

<div id="page1" class="page active">
    <div class="content-frame">
        <h2 style="font-family:'Bangers'; font-size: 2.5rem; margin-top: 0;">CHOOSE A DOMAIN</h2>
        <button class="btn-main" onclick="selectDomain('Academic')">📚 Academic</button>
        <button class="btn-main" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</button>
        <button class="btn-main" onclick="selectDomain('Cognitive')">🧠 Cognitive</button>
        <button class="btn-main" onclick="selectDomain('Affective')">💛 Affective</button>
    </div>
</div>

<div id="page2" class="page">
    <button class="nav-btn" onclick="goHome()">🏠 HOME</button>
    <div class="content-frame">
        <h2 id="domainTitle" style="font-family:'Bangers'; color: #d63031; font-size: 2rem;"></h2>
        <div id="problemList" style="text-align: left; margin: 20px 0;"></div>
        <button class="btn-main" style="background: #2ecc71;" onclick="showCards()">VIEW SOLUTION</button>
    </div>
</div>

<div id="page3" class="page">
    <button class="nav-btn" onclick="goBackProblems()">⬅ BACK</button>
    <div class="content-frame" id="cards"></div>
</div>

<script>
const data = {
    Academic: { "Poor Concentration": ["Practice specific hand movements.", "Use a focus timer."], "Excessive Worry": ["Practice deep breathing."] },
    Cognitive: { "Feeling Helpless": ["Reach out to a counselor.", "Positive self-talk."], "Negative Thinking": ["Go for a walk."] },
    Affective: { "Crying Easily": ["Give yourself space to feel."], "Irritability": ["Talk to a trusted friend."] },
    Psychomotor: { "Headaches": ["Eye relaxation exercises."], "Muscle Tension": ["Stretching."], "Sleep": ["Maintain a sleep routine."] }
};

let currentDomain = "";

function selectDomain(domain) {
    currentDomain = domain;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page2").classList.add("active");
    document.getElementById("domainTitle").innerText = domain + " Challenges";
    
    let list = "";
    for (let prob in data[domain]) {
        list += `<label style="display:block; padding: 10px; border-bottom: 1px solid #ccc; cursor:pointer;">
                 <input type="radio" name="prob" value="${prob}"> ${prob}</label>`;
    }
    document.getElementById("problemList").innerHTML = list;
}

function showCards() {
    const selected = document.querySelector('input[name="prob"]:checked');
    if (!selected) return alert("Please select one.");
    
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page3").classList.add("active");
    
    let solutions = data[currentDomain][selected.value].map(s => `<li>${s}</li>`).join("");
    document.getElementById("cards").innerHTML = `<h3>${selected.value}</h3><ul>${solutions}</ul>`;
}

function goHome() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById("page1").classList.add("active"); }
function goBackProblems() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById("page2").classList.add("active"); }
</script>

</body>
</html>
