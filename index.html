<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashamana: Nurturing the Caregiver</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@800&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Global Reset & Layout */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Comic Neue', cursive; background-color: #f0f8ff; }
        .page { display: none; width: 100%; height: 100%; padding-top: 100px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; align-items: center; }

        /* App Header */
        .app-header { position: fixed; top: 0; width: 100%; text-align: center; background: #ffffff; padding: 20px 0; border-bottom: 5px solid #2d3436; z-index: 1000; }
        .app-header h1 { font-family: 'Montserrat', sans-serif; font-size: 2rem; color: #2d3436; margin: 0; }
        .app-header span { color: #d63031; border-bottom: 3px solid #d63031; }

        /* Container Styles */
        .main-container { width: 90%; max-width: 700px; background: white; padding: 30px; border: 6px solid #2d3436; border-radius: 30px; }
        .domain-btn { padding: 10px 20px; font-family: 'Bangers'; font-size: 1.2rem; cursor: pointer; border: 3px solid #2d3436; border-radius: 10px; margin: 5px; }
        
        .challenge-option { display: block; padding: 20px; margin: 15px 0; background: #f9f9f9; border: 2px solid #ddd; border-radius: 15px; font-size: 1.3rem; font-weight: bold; cursor: pointer; }
        .btn-view { width: 100%; padding: 20px; background: #2ecc71; border: 4px solid #2d3436; border-radius: 15px; font-family: 'Bangers'; font-size: 1.8rem; cursor: pointer; }

        /* Card Styles */
        .card-view { width: 500px; height: 400px; background: #55efc4; border: 5px solid #2d3436; border-radius: 25px; padding: 30px; }
    </style>
</head>
<body>

<header class="app-header"><h1>PRASHAMANA: <span>Nurturing the Caregiver</span></h1></header>

<!-- Domain Selection Page -->
<div id="page1" class="page active">
    <div class="main-container" style="text-align:center;">
        <h2 style="font-family:'Bangers';">CHOOSE A DOMAIN</h2>
        <button class="domain-btn" onclick="selectDomain('Academic')">📚 Academic</button>
        <button class="domain-btn" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</button>
        <button class="domain-btn" onclick="selectDomain('Cognitive')">🧠 Cognitive</button>
        <button class="domain-btn" onclick="selectDomain('Affective')">💛 Affective</button>
    </div>
</div>

<!-- Challenges Page -->
<div id="page2" class="page">
    <div class="main-container">
        <h2 id="domainTitle" style="font-family:'Bangers'; color:#d63031; text-align:center;"></h2>
        <div id="problemList"></div>
        <button class="btn-view" onclick="showSolution()">VIEW SOLUTION</button>
    </div>
</div>

<script>
const data = {
    Psychomotor: ["Frequent Headaches", "Muscle Tension", "Irregular Sleep"]
};

function selectDomain(domain) {
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
    document.getElementById('domainTitle').innerText = domain.toUpperCase() + " CHALLENGES";
    
    let html = "";
    data[domain].forEach(item => {
        html += `<label class="challenge-option"><input type="radio" name="prob" value="${item}"> ${item}</label>`;
    });
    document.getElementById('problemList').innerHTML = html;
}
</script>
</body>
</html>
