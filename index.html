<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashamana: Nurturing the Caregiver</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@800&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Comic Neue', cursive; background-color: #f0f8ff; overflow-x: hidden; }
        
        .page { display: none; width: 100vw; height: 100vh; position: relative; padding-top: 80px; box-sizing: border-box; }
        .active { display: flex; }

        /* Header */
        .app-header { position: fixed; top: 0; width: 100%; text-align: center; background: #ffffff; padding: 15px 0; border-bottom: 5px solid #2d3436; z-index: 1000; }
        .app-header h1 { font-family: 'Montserrat', sans-serif; font-size: 2rem; color: #2d3436; margin: 0; }
        .app-header span { color: #d63031; border-bottom: 3px solid #d63031; }

        /* Page 1 (The original side-by-side layout) */
        #page1 { background: #62c6e2; align-items: center; justify-content: center; }
        .p1-layout { display: flex; flex-direction: row; align-items: center; justify-content: center; width: 90%; max-width: 1000px; gap: 40px; }
        .nurse-landing { flex: 0 0 350px; height: 400px; background: url('1.jpeg') no-repeat center center; background-size: contain; }
        .domain-menu { flex: 0 1 400px; display: flex; flex-direction: column; gap: 15px; }
        .btn-main { padding: 15px; background: white; border: 4px solid #2d3436; border-radius: 15px; font-family: 'Bangers'; font-size: 1.5rem; cursor: pointer; box-shadow: 4px 4px 0px #2d3436; }

        /* Page 2 (Border frame style) */
        #page2 { background-color: #e3f2fd; align-items: center; justify-content: center; flex-direction: column; }
        .medical-border-frame { width: 90%; max-width: 600px; background: white; padding: 30px; border: 6px solid #2d3436; border-radius: 30px; }
        .challenge-label { display: block; margin: 10px 0; background: #eee; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Page 3 (Solution Card) */
        #page3 { background: #d48e8e; align-items: center; justify-content: center; }
        .card-view { width: 500px; height: 500px; background: #55efc4; border: 5px solid #2d3436; border-radius: 25px; padding: 30px; }
        .nav-btn { position: absolute; top: 100px; left: 30px; background: #ff3b3b; color: white; border: 3px solid black; padding: 10px 20px; font-family: 'Bangers'; cursor: pointer; border-radius: 12px; }
    </style>
</head>
<body>

<header class="app-header"><h1>PRASHAMANA: <span>Nurturing the Caregiver</span></h1></header>

<div id="page1" class="page active">
    <div class="p1-layout">
        <div class="nurse-landing"></div>
        <div class="domain-menu">
            <h2 style="font-family:'Bangers'; color: white; font-size: 2.5rem; text-align:center;">CHOOSE A DOMAIN</h2>
            <button class="btn-main" onclick="selectDomain('Academic')">📚 Academic</button>
            <button class="btn-main" onclick="selectDomain('Psychomotor')">🏃 Psychomotor</button>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <button class="nav-btn" onclick="location.reload()">🏠 HOME</button>
    <div class="medical-border-frame">
        <h2 id="domainTitle" style="font-family:'Bangers'; color:#d63031; text-align:center;"></h2>
        <div id="problemList"></div>
        <button class="btn-main" style="width:100%; background:#2ecc71;" onclick="showSolution()">VIEW SOLUTION</button>
    </div>
</div>

<div id="page3" class="page">
    <button class="nav-btn" onclick="backToProblems()">⬅ BACK</button>
    <div class="card-view" id="solutionContent"></div>
</div>

<script>
const data = {
    Academic: ["Poor Concentration", "Excessive Worry"],
    Psychomotor: ["Frequent Headaches", "Muscle Tension", "Irregular Sleep"]
};

function selectDomain(domain) {
    document.getElementById('page1').style.display = 'none';
    document.getElementById('page2').classList.add('active');
    document.getElementById('domainTitle').innerText = domain.toUpperCase() + " CHALLENGES";
    let html = "";
    data[domain].forEach(item => {
        html += `<label class="challenge-label"><input type="radio" name="prob" value="${item}"> ${item}</label>`;
    });
    document.getElementById('problemList').innerHTML = html;
}

function showSolution() {
    const selected = document.querySelector('input[name="prob"]:checked');
    if (!selected) return alert("Select a challenge!");
    
    let sol = selected.value === "Irregular Sleep" 
        ? "<li>Maintain a consistent sleep cycle.</li><li>Watch: <a href='https://youtube.com/shorts/GeQK1Ej-Fpg' target='_blank'>Sleep Cycle Guide</a></li>"
        : "<li>General wellness advice for this challenge.</li>";

    document.getElementById('solutionContent').innerHTML = `<h2 style='color:#d63031; font-family:Bangers;'>SOLUTION:</h2><ul>${sol}</ul>`;
    document.getElementById('page2').style.display = 'none';
    document.getElementById('page3').classList.add('active');
}

function backToProblems() {
    document.getElementById('page3').style.display = 'none';
    document.getElementById('page2').style.display = 'flex';
}
</script>
</body>
</html>
